<!DOCTYPE html>

    <style>
        .book-text {
            max-width: 800px;
            margin: 30px auto 0 auto;
            text-align: justify;
            font-size: 1.1rem;
        }
        /* Старинная буквица для красивого начала текста */
        .book-text p::first-letter {
            font-size: 3.5rem;
            float: left;
            margin-right: 8px;
            color: #722F37;
            font-weight: bold;
            line-height: 1;
        }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            color: #722F37;
            font-weight: bold;
            border-bottom: 1px dashed #722F37;
        }
    </style>
</head>

    <section>

        <div class="book-text">
    
            <p>Текст </p>
            <br>
            
            <p>Текст</p>

        <a href="index.html" class="back-link">← Вернуться на главную страницу архива</a>

    </footer>
